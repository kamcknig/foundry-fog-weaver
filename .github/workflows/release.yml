name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and attach zip to (e.g. v0.1.0)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Resolve tag and version
        run: |
          TAG=${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "VERSION=${TAG#v}" >> $GITHUB_ENV

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Find source branch
        run: |
          SOURCE_BRANCH=$(git branch -r --contains "$TAG" \
            | grep -v 'HEAD' \
            | sed 's|.*origin/||' \
            | tr -d ' ' \
            | head -1)
          echo "SOURCE_BRANCH=${SOURCE_BRANCH:-master}" >> $GITHUB_ENV

      - name: Bump module.json on source branch
        run: |
          git checkout "$SOURCE_BRANCH"

          CURRENT=$(jq -r '.version' module.json)
          if [ "$CURRENT" = "$VERSION" ]; then
            echo "BUMPED=false" >> $GITHUB_ENV
            exit 0
          fi

          jq --arg version "$VERSION" \
             --arg download "https://github.com/kamcknig/foundry-fog-weaver/releases/download/$TAG/module.zip" \
             '.version = $version | .download = $download' \
             module.json > module.tmp.json && mv module.tmp.json module.json

          git add module.json
          git commit -m "chore: update module.json to $VERSION"
          git push origin "$SOURCE_BRANCH"
          echo "BUMPED=true" >> $GITHUB_ENV

      - name: Move tag to bumped commit
        if: env.BUMPED == 'true'
        run: |
          git tag -f "$TAG"
          git push origin "refs/tags/$TAG" --force

      - name: Build module zip
        run: zip -r module.zip module.json README.md scripts/ styles/ lang/

      - name: Attach zip to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$TAG" &>/dev/null; then
            gh release upload "$TAG" module.zip --clobber
          else
            gh release create "$TAG" module.zip \
              --title "$TAG" \
              --generate-notes
          fi
